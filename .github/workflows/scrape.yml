name: Nexon Forum Scraper

on:
  workflow_dispatch:
    inputs:
      game_slug:
        description: "게임 슬러그 (예: maplestoryidle-kr)"
        required: true
        type: string
      board_id:
        description: "게시판 ID (예: 6698)"
        required: true
        type: string
      board_name:
        description: "게시판 이름 (예: 패치노트)"
        required: false
        type: string
        default: ""

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scraper/requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run scraper
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GAS_ENDPOINT: ${{ secrets.GAS_ENDPOINT }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GAME_SLUG: ${{ inputs.game_slug }}
          BOARD_ID: ${{ inputs.board_id }}
          BOARD_NAME: ${{ inputs.board_name }}
        run: python scraper/scrape.py

      - name: Commit updated sheets index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sheets.json
          git diff --cached --quiet || git commit -m "chore: update sheets index [skip ci]"
          git push
